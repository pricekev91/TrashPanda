services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trashpanda}
      POSTGRES_USER: ${POSTGRES_USER:-trashpanda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trashpanda}
    volumes:
      - trashpanda-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trashpanda} -d ${POSTGRES_DB:-trashpanda}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://trashpanda:trashpanda@db:5432/trashpanda}
      TRASHPANDA_AI_BASE_URL: ${TRASHPANDA_AI_BASE_URL:-http://192.168.6.252:8080/v1}
      TRASHPANDA_AI_MODEL: ${TRASHPANDA_AI_MODEL:-qwen2.5-coder-verbose:latest}
      TRASHPANDA_CONFIG_DIR: /app/config
      TRASHPANDA_DATA_DIR: /app/data
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ${TRASHPANDA_CONFIG_DIR:-./runtime/config}:/app/config:ro
      - ${TRASHPANDA_DATA_DIR:-./runtime/data}:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "workers.app.main"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://trashpanda:trashpanda@db:5432/trashpanda}
      TRASHPANDA_CONFIG_DIR: /app/config
      TRASHPANDA_DATA_DIR: /app/data
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${TRASHPANDA_CONFIG_DIR:-./runtime/config}:/app/config:ro
      - ${TRASHPANDA_DATA_DIR:-./runtime/data}:/app/data

  dashboard:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${TRASHPANDA_FRONTEND_PORT:-3000}:80"

volumes:
  trashpanda-postgres: